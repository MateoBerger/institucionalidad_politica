<!DOCTYPE html>
<html>
<head>
  <title>PAES App</title>
</head>
<body>

<h1>Mi app PAES</h1>

<button onclick="login()">Iniciar sesión con Google</button>

<p id="user"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKOTRS745bQrf3ahzKh5kmce_ZHoif9Ic",
  authDomain: "paes-pro-ca205.firebaseapp.com",
  projectId: "paes-pro-ca205",
  storageBucket: "paes-pro-ca205.firebasestorage.app",
  messagingSenderId: "563171426468",
  appId: "1:563171426468:web:40c5e2849a3974d9946631"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth();
const provider = new GoogleAuthProvider();

window.login = function(){
  signInWithPopup(auth, provider)
    .then((result) => {
      document.getElementById("user").innerText = result.user.email;
    })
    .catch((error) => {
      alert("Error: " + error.message);
    });
}
</script>

</body>
</html>
